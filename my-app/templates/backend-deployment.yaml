apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.backend.replicas }}

  selector:
    matchLabels:
      app: backend


  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        env:
        - name: MESSAGE
          value: "{{ .Values.config.MESSAGE }}"

        - name: API_KEY
          value: "{{ .Values.secret.API_KEY }}"

