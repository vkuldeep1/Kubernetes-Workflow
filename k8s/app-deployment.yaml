apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app


spec:
  replicas: 2

  selector:
    matchLabels:
      app: node-app

  template:
    metadata:
      labels:
        app: node-app


    spec:
      containers:
      - name: node-app
        image: demo-node-app
        imagePullPolicy: Never

        ports:
        - containerPort: 3000

        env:
        - name: MESSAGE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MESSAGE

        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: API_KEY


        
